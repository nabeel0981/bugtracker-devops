name: BugTracker CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/BugTracker.Web/BugTracker.Web.csproj

      - name: Build
        run: dotnet build src/BugTracker.Web/BugTracker.Web.csproj --no-restore -c Release

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/BugTracker.Web
          dockerfile: ./src/BugTracker.Web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bugtracker:latest
            ${{ secrets.DOCKER_USERNAME }}/bugtracker:${{ github.sha }}
